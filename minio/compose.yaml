name: minio-stack

services:
  minio:
    image: docker.io/minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    restart: unless-stopped
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY_VARIABLE_GIT:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY_SECRET_GIT:-minioadmin}
    volumes:
      - minio_data:/data
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.50'
        reservations:
          memory: 256M
          cpus: '0.25'
    networks:
      - kinForge-net
      - caddy_network

volumes:
  minio_data:

networks:
  kinForge-net:
    external: true
  caddy_network:
    external: true
    name: caddy_network
