name: Build — galfield-pos (Tauri desktop installers)

# Solo construye los instalables de escritorio (Windows/macOS/Linux) y los
# deja como artifacts del workflow. No hay deploy a servidor — es una app
# de escritorio, se distribuye descargando el instalador de aquí.

on:
  push:
    branches: [master]
    paths:
      - 'apps/galfield-pos/**'
  workflow_dispatch: {}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            artifact-name: galfield-pos-windows
          - platform: macos-latest
            artifact-name: galfield-pos-macos
          - platform: ubuntu-latest
            artifact-name: galfield-pos-linux

    runs-on: ${{ matrix.platform }}
    defaults:
      run:
        working-directory: apps/galfield-pos

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Dependencias nativas de Tauri en Linux (webkit2gtk, etc.)
      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/galfield-pos/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/galfield-pos/src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: apps/galfield-pos

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: |
            apps/galfield-pos/src-tauri/target/release/bundle/**/*.msi
            apps/galfield-pos/src-tauri/target/release/bundle/**/*.exe
            apps/galfield-pos/src-tauri/target/release/bundle/**/*.dmg
            apps/galfield-pos/src-tauri/target/release/bundle/**/*.app.tar.gz
            apps/galfield-pos/src-tauri/target/release/bundle/**/*.deb
            apps/galfield-pos/src-tauri/target/release/bundle/**/*.rpm
            apps/galfield-pos/src-tauri/target/release/bundle/**/*.AppImage
          if-no-files-found: error
          retention-days: 14
