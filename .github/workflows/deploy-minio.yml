name: Deploy MinIO (Object Storage)

on:
  push:
    branches:
      - master
    paths:
      - 'minio/**'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: works
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Desplegar MinIO en Contabo vía SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ vars.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            cd /home/bob/projects/galfields/
            git pull origin master
            cd minio

            export MINIO_ACCESS_KEY_VARIABLE_GIT='${{ vars.MINIO_ACCESS_KEY }}'
            export MINIO_SECRET_KEY_SECRET_GIT='${{ secrets.MINIO_SECRET_KEY }}'

            # MinIO usa imagen oficial, no tiene build local.
            podman-compose pull
            podman-compose up -d

            echo "✔ MinIO desplegado"
