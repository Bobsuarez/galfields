# Workflow reutilizable: construye una imagen Docker y la publica en GHCR.
# No se ejecuta directamente — es invocado por los workflows de cada servicio.
#
# Uso:
#   jobs:
#     build:
#       uses: ./.github/workflows/_build-push.yml
#       with:
#         service: pos-backend
#         dockerfile: backend/pos/Dockerfile
#         context: backend/pos
#       secrets: inherit

name: '[Reusable] Build & Push to GHCR'

on:
  workflow_call:
    inputs:
      service:
        description: 'Nombre del servicio (ej: pos-backend, caddy)'
        required: true
        type: string
      dockerfile:
        description: 'Ruta al Dockerfile desde la raíz del repo'
        required: true
        type: string
      context:
        description: 'Build context desde la raíz del repo'
        required: true
        type: string
      build-args:
        description: 'Build args KEY=VALUE separados por salto de línea'
        required: false
        type: string
        default: ''
    outputs:
      sha-tag:
        description: 'Tag SHA corto de la imagen: sha-XXXXXXX'
        value: ${{ jobs.build.outputs.sha-tag }}
      digest:
        description: 'Digest SHA256 content-addressable de la imagen'
        value: ${{ jobs.build.outputs.digest }}
      image:
        description: 'URL completa de la imagen en GHCR (sin tag)'
        value: ${{ jobs.build.outputs.image }}

jobs:
  build:
    name: Build & Push — ${{ inputs.service }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      sha-tag: ${{ steps.sha.outputs.tag }}
      digest: ${{ steps.push.outputs.digest }}
      image: ${{ steps.image.outputs.name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # SHA corto del commit — se usa como tag inmutable para rollback
      - name: Compute SHA tag
        id: sha
        run: echo "tag=sha-$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      # Nombre de imagen en minúsculas (requerido por GHCR)
      - name: Compute image name
        id: image
        run: |
          OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')
          echo "name=ghcr.io/${OWNER}/galfields/${{ inputs.service }}" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Genera tags automáticamente:
      #   latest       — rama master
      #   sha-abc1234  — SHA corto del commit (siempre)
      #   v1.2.3       — desde git tag semver
      #   1.2          — major.minor desde git tag semver
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}
            type=sha,prefix=sha-,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      # Cache por servicio: cada imagen tiene su propio namespace en GHA cache.
      # mode=max cachea todas las capas, no solo las finales.
      - name: Build and push
        id: push
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ inputs.build-args }}
          platforms: linux/amd64
          cache-from: type=gha,scope=${{ inputs.service }}
          cache-to: type=gha,mode=max,scope=${{ inputs.service }}

      - name: Write job summary
        run: |
          echo "## 🐳 ${{ inputs.service }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Campo | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| SHA Tag | \`${{ steps.sha.outputs.tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Digest | \`${{ steps.push.outputs.digest }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tags publicados:**" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
