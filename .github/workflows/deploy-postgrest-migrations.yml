name: Deploy — PostgreSQL schema migrations (Flyway)

# Flyway aplica solo los cambios pendientes (V2+, V3+...) sin tocar el
# contenedor ni los datos. La base de datos sigue corriendo durante la migración.
#
# Para CREAR una migración nueva:
#   backend/postgrest/migrations/V{n}__{descripcion}.sql
#
# Para ver estado de migraciones:
#   backend/postgrest/migrations/README.md

on:
  push:
    branches: [master]
    paths:
      - 'backend/postgrest/migrations/**'

jobs:
  migrate:
    name: Apply Flyway migrations
    runs-on: ubuntu-latest
    environment: works
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Flyway migrations on VPS
        uses: appleboy/ssh-action@v1.0.3
        env:
          # Declarados como env vars del step para que 'envs' los exporte al
          # shell remoto. Nunca se interpolan como texto literal en el script,
          # así el password puede contener cualquier caracter especial.
          FLYWAY_DB_NAME: ${{ vars.DB_NAME }}
          FLYWAY_DB_USER: ${{ vars.DB_USERNAME }}
          FLYWAY_DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ vars.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          command_timeout: 10m
          envs: FLYWAY_DB_NAME,FLYWAY_DB_USER,FLYWAY_DB_PASSWORD
          script: |
            set -e
            cd /home/bob/projects/galfields
            git pull origin master

            echo "Iniciando migraciones Flyway..."

            MIGRATIONS_DIR='/home/bob/projects/galfields/backend/postgrest/migrations'

            # Flyway corre como contenedor one-shot en galfields-net.
            # Se conecta a gf-db-primary por nombre de servicio (sin exponer puertos).
            # baselineOnMigrate=true: en DBs existentes marca V1 como hecha sin ejecutarla,
            # luego aplica solo V2, V3, etc. que no esten en flyway_schema_history.
            podman run --rm \
              --network=galfields-net \
              -v "${MIGRATIONS_DIR}:/flyway/sql:ro,Z" \
              -e FLYWAY_URL="jdbc:postgresql://gf-db-primary:5432/${FLYWAY_DB_NAME}" \
              -e FLYWAY_USER="${FLYWAY_DB_USER}" \
              -e FLYWAY_PASSWORD="${FLYWAY_DB_PASSWORD}" \
              -e FLYWAY_SCHEMAS=public \
              -e FLYWAY_LOCATIONS=filesystem:/flyway/sql \
              -e FLYWAY_BASELINE_ON_MIGRATE=true \
              -e FLYWAY_BASELINE_VERSION=1 \
              -e FLYWAY_VALIDATE_ON_MIGRATE=true \
              -e FLYWAY_OUT_OF_ORDER=false \
              docker.io/flyway/flyway:10-alpine \
              migrate

            echo "Migraciones aplicadas correctamente"

            echo "Estado actual del schema:"
            podman run --rm \
              --network=galfields-net \
              -v "${MIGRATIONS_DIR}:/flyway/sql:ro,Z" \
              -e FLYWAY_URL="jdbc:postgresql://gf-db-primary:5432/${FLYWAY_DB_NAME}" \
              -e FLYWAY_USER="${FLYWAY_DB_USER}" \
              -e FLYWAY_PASSWORD="${FLYWAY_DB_PASSWORD}" \
              -e FLYWAY_SCHEMAS=public \
              -e FLYWAY_LOCATIONS=filesystem:/flyway/sql \
              -e FLYWAY_BASELINE_ON_MIGRATE=true \
              -e FLYWAY_BASELINE_VERSION=1 \
              docker.io/flyway/flyway:10-alpine \
              info
