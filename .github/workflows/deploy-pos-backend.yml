name: CI/CD — pos-backend (Spring Boot)

on:
  push:
    branches: [master]
    paths:
      - 'backend/pos/**'

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    name: Build & push image
    uses: ./.github/workflows/_build-push.yml
    secrets: inherit
    with:
      service: pos-backend
      dockerfile: backend/pos/Dockerfile
      context: backend/pos