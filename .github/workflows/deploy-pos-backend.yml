name: CI/CD — pos-backend (Spring Boot)

on:
  push:
    branches: [master]
    paths:
      - 'backend/pos/**'

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    name: Build & push image
    uses: ./.github/workflows/_build-push.yml
    secrets: inherit
    with:
      service: pos-backend
      dockerfile: backend/pos/Dockerfile
      context: backend/pos

  deploy:
    name: Deploy to Contabo VPS
    needs: build-push
    runs-on: ubuntu-latest
    environment: works
    steps:
      - name: Pull image and restart pos-backend
        uses: appleboy/ssh-action@v1.0.3
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_ACTOR: ${{ github.actor }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ vars.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          command_timeout: 10m
          envs: GHCR_TOKEN,GHCR_ACTOR
          script: |
            set -e
            IMAGE="${{ needs.build-push.outputs.image }}"
            TAG="${{ needs.build-push.outputs.sha-tag }}"

            echo "→ Desplegando ${IMAGE}:${TAG}"

            echo "$GHCR_TOKEN" | podman login ghcr.io -u "$GHCR_ACTOR" --password-stdin
            podman pull "${IMAGE}:${TAG}"

            cd /home/bob/projects/galfields/backend/pos

            export POS_BACKEND_IMAGE="${IMAGE}:${TAG}"
            export DB_NAME='${{ vars.DB_NAME }}'
            export DB_USERNAME='${{ vars.DB_USERNAME }}'
            export DB_PASSWORD='${{ secrets.DB_PASSWORD }}'
            export MINIO_ACCESS_KEY='${{ vars.MINIO_ACCESS_KEY }}'
            export MINIO_SECRET_KEY='${{ secrets.MINIO_SECRET_KEY }}'

            podman-compose up -d --no-build pos-backend

            podman logout ghcr.io
            podman image prune -f

            echo "✔ pos-backend desplegado: ${TAG}"
