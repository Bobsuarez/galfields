services:

  # ============================================================
  # PRIMARIO — recibe escrituras, genera WAL para la réplica
  # ============================================================
  gf-db-primary:
    image: docker.io/library/postgres:15-alpine
    container_name: gf-db-primary
    environment:
      - TZ=America/Bogota
      - PGTZ=America/Bogota # Específico para PostgreSQL
      - POSTGRES_DB=${DB_NAME:-pos}
      - POSTGRES_USER=${DB_USERNAME:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-bob123}
    volumes:
      - gf-primary-data:/var/lib/postgresql/data
      # 00_ se ejecuta PRIMERO: crea el usuario replicator y configura WAL + pg_hba
      - ./00_setup_replication.sh:/docker-entrypoint-initdb.d/00_setup_replication.sh:ro,Z
      # El esquema lo crea Flyway (pos-backend) al arrancar; no se monta ningún
      # script de esquema aquí para evitar dos fuentes de verdad en conflicto.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_NAME:-pos}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - galfields-net

  # ============================================================
  # RÉPLICA — solo lectura, se sincroniza del primario via WAL
  # ============================================================
  gf-db-replica:
    image: docker.io/library/postgres:15-alpine
    container_name: gf-db-replica
    environment:
      # PGPASSWORD es la contraseña que usa pg_basebackup para autenticarse como replicator
      - TZ=America/Bogota
      - PGTZ=America/Bogota # Específico para PostgreSQL
      - PGPASSWORD=repl_secret
    command: |
      bash -c "
        if [ ! -f /var/lib/postgresql/data/PG_VERSION ]; then
          echo 'Primera vez: copiando datos del primario con pg_basebackup...'
          until pg_basebackup -h gf-db-primary -D /var/lib/postgresql/data -U replicator -Fp -Xs -P -R; do
            echo 'El primario aún no está listo, reintentando en 2s...'
            sleep 2
          done
          chown -R postgres:postgres /var/lib/postgresql/data
          chmod 700 /var/lib/postgresql/data
        fi
        exec su-exec postgres postgres -D /var/lib/postgresql/data
      "
    volumes:
      - gf-replica-data:/var/lib/postgresql/data
    depends_on:
      gf-db-primary:
        condition: service_healthy
    networks:
      - galfields-net

networks:
  galfields-net:
    external: true

volumes:
  gf-primary-data:
  gf-replica-data:
