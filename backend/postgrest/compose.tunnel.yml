# Overlay para acceso via SSH tunnel desde máquina local.
# Expone los puertos SOLO en loopback (127.0.0.1) — no accesibles desde internet.
#
# Uso en VPS:
#   podman-compose -f compose.yaml -f compose.tunnel.yml up -d
#
# Luego desde tu máquina local abre el tunnel:
#   ssh -L 5433:127.0.0.1:5433 tu_usuario@tu_vps_ip -N
#   ssh -L 5434:127.0.0.1:5434 tu_usuario@tu_vps_ip -N

services:
  em-db-primary:
    ports:
      - "127.0.0.1:5433:5432"

  em-db-replica:
    ports:
      - "127.0.0.1:5434:5432"
