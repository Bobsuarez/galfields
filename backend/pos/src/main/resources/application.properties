spring.application.name=pos
server.port=${SERVER_PORT:8080}

# Datasource (PostgreSQL is the cloud source of truth)
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:galfields_pos}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:bob123}

# Schema is owned by Flyway migrations (src/main/resources/db/migration); Hibernate only validates it matches.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

spring.flyway.enabled=true
# The cluster's Postgres pod may already have a schema created by its own
# init script (predates these migrations, roughly equivalent to V1); baseline
# at version 1 so Flyway treats V1 as already satisfied instead of re-running
# CREATE TABLE against tables that already exist, and only applies V2+
# (seed data, then realigning column types with the entities).
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1

# MinIO object storage (product images)
# minio.endpoint: internal address the backend uses to talk to MinIO directly (put/remove/bucket checks).
# minio.public-endpoint: CDN base URL returned to clients as a plain (unsigned) URL - the bucket is
# served publicly through the CDN, so this is string concatenation, not a presigned/signed URL.
# In production this MUST be set via MINIO_PUBLIC_ENDPOINT=https://cdn.galfields.kinforgeworks.com -
# it's indispensable, see the "Image URLs / CDN" note in CLAUDE.md. Left defaulted to minio.endpoint
# here so local dev (no CDN in front of the dev MinIO container) keeps working out of the box.
minio.endpoint=${MINIO_ENDPOINT:http://localhost:9000}
minio.public-endpoint=${MINIO_PUBLIC_ENDPOINT:${MINIO_ENDPOINT:http://localhost:9000}}
minio.access-key=${MINIO_ACCESS_KEY:minioadmin}
minio.secret-key=${MINIO_SECRET_KEY:minioadmin}
minio.bucket=${MINIO_BUCKET:galfields-products}

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# OpenAPI / Swagger UI (springdoc)
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
