spring.application.name=pos
server.port=${SERVER_PORT:8080}

# Datasource (PostgreSQL is the cloud source of truth)
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:galfields_pos}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

# Schema is owned by Flyway migrations (src/main/resources/db/migration); Hibernate only validates it matches.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

spring.flyway.enabled=true
# The cluster's Postgres pod may already have a schema created by its own
# init script (predates these migrations); baseline it instead of failing
# so V3+ can still run and realign column types with the entities.
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# MinIO object storage (product images)
minio.endpoint=${MINIO_ENDPOINT:http://localhost:9000}
minio.access-key=${MINIO_ACCESS_KEY:minioadmin}
minio.secret-key=${MINIO_SECRET_KEY:minioadmin}
minio.bucket=${MINIO_BUCKET:galfields-products}
minio.presigned-url-expiry-seconds=${MINIO_PRESIGNED_URL_EXPIRY_SECONDS:3600}

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
