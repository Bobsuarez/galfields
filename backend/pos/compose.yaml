name: galfields-pos-backend

services:
  pos-backend:
    image: ${POS_BACKEND_IMAGE:-ghcr.io/bobsuarez/galfields/pos-backend:latest}
    container_name: galfields-pos-backend
    restart: unless-stopped
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://gf-db-primary:5432/${DB_NAME:-pos}
      - SPRING_DATASOURCE_USERNAME=${DB_USERNAME:-postgres}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD:-bob123}
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
    networks:
      - galfields-net
      - caddy_network

networks:
  galfields-net:
    external: true
  caddy_network:
    external: true
    name: caddy_network
